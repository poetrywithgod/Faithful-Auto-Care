<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Faithful Auto Care</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="font-sans">

  <!-- HERO SECTION -->
  <section class="relative h-screen w-full bg-cover bg-center"
    style="background-image: url('utilities/Images/LandingPage1.png'); background-size: cover; background-position: center; ">

    <!-- Overlay -->
    <div class="absolute inset-0 bg-black/20"></div>

    <!-- NAVBAR -->
    <nav class="relative z-10 flex items-center justify-between px-10 py-6 text-white">
      
      <!-- Logo -->
      <div class="flex items-center gap-3">
        <img src="utilities/Images/logo.png" alt="Faithful Auto Care Logo" class="h-10 w-auto" />
        <span class="text-lg font-semibold uppercase tracking-wide">
          Faithful Auto Care
        </span>
      </div>

      <!-- Nav Links -->
      <ul class="hidden md:flex items-center gap-10 text-sm font-medium">
        <li class="hover:text-blue-400 cursor-pointer">Home</li>
        <li class="hover:text-blue-400 cursor-pointer">About Us</li>
        <li class="hover:text-blue-400 cursor-pointer">Services</li>
        <li class="hover:text-blue-400 cursor-pointer">Process</li>
        <li class="hover:text-blue-400 cursor-pointer">Price</li>
      </ul>

      <!-- Action Buttons -->
      <div class="flex items-center gap-4">
        <button class="flex items-center gap-2 bg-blue-600 hover:bg-blue-700 px-4 py-2 rounded-lg text-sm font-medium">
          💬 Chat us
        </button>
        <button class="flex items-center gap-2 bg-blue-500 hover:bg-blue-600 px-4 py-2 rounded-lg text-sm font-medium">
          📞 Call
        </button>
      </div>
    </nav>

    <!-- HERO CONTENT -->
    <div class="relative z-10 flex h-full items-center px-10">
      <div class="max-w-2xl text-white">
        
        <h1 class="text-5xl md:text-6xl font-extrabold leading-tight">
          Professional shine.<br />
          Exceptional care.
        </h1>

        <p class="mt-6 text-base md:text-lg text-gray-200 leading-relaxed">
          Where every wash restores that brand-new feeling, leaving your car
          spotless, refreshed, and ready to own the road with confidence.
        </p>

        <button class="mt-8 bg-blue-600 hover:bg-blue-700 px-6 py-3 rounded-lg text-white font-semibold">
          Book Now
        </button>
      </div>
    </div>

  </section>

  <section>
    
  </section>

</body>
</html>
